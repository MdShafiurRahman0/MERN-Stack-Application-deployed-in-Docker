services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"

  backend:
    build: ./mern/backend
    container_name: backend
    ports:
      - "5050:5050"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017

  frontend:
    build: ./mern/frontend
    container_name: frontend
    ports:
      - "5178:80"
    depends_on:
      - backend
