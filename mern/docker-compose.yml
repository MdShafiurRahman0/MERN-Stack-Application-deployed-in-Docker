version: "3.8"

services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "5050:5050"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://admin:admin123@mongodb:27017/mydb?authSource=admin

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "5178:80"
    depends_on:
      - backend

volumes:
  mongo_data: